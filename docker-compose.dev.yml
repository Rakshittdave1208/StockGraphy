services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.web.dev
    environment:
      VITE_PROXY_TARGET: http://proxy:5000
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      proxy:
        condition: service_started
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules

  proxy:
    build:
      context: .
      dockerfile: proxy/Dockerfile.dev
    env_file:
      - ./.env
    environment:
      PORT: 5000
      CLIENT_ORIGIN: http://localhost:3000
      REDIS_URL: redis://redis:6379
    ports:
      - "5000:5000"
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - proxy_node_modules:/app/node_modules

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data

volumes:
  web_node_modules:
  proxy_node_modules:
  redis_data:
